<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3U8 Stream Catcher - 下载管理器</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    body { background: var(--bg); }

    .manager-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-title-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--bg);
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .tab.active .tab-count { background: var(--primary-light); color: var(--primary); }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s;
    }

    .task-card:hover { box-shadow: var(--shadow-lg); }

    .task-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-all;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .task-progress {
      margin-bottom: 12px;
    }

    .task-progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .task-speed { color: var(--primary); font-weight: 600; }
    .task-remaining { color: var(--text-muted); }

    /* 大文件说明条 */
    .merge-info-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .merge-info-bar .badge { font-size: 11px; }
  </style>
</head>
<body>
  <div class="manager-container">
    <!-- 顶部 -->
    <div class="page-header">
      <div class="page-title">
        <div class="page-title-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </div>
        M3U8 Stream Catcher
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="btn-open-settings">
          &#9881; 设置
        </button>
        <button class="btn btn-primary" id="btn-add-url">
          &#43; 添加链接
        </button>
      </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <div class="tab active" data-tab="downloads">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        下载任务
        <span class="tab-count" id="tab-downloads-count">0</span>
      </div>
      <div class="tab" data-tab="captured">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        已捕获链接
        <span class="tab-count" id="tab-captured-count">0</span>
      </div>
    </div>

    <!-- 内容区 -->
    <div id="tab-content">
      <!-- 动态填充 -->
    </div>
  </div>

  <script src="../lib/storage-utils.js"></script>
  <script src="download-manager.js"></script>
</body>
</html>
