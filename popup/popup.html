<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M3U8 Stream Catcher</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <style>
    /* Popup 专用样式 */
    .popup {
      width: 360px;
      min-height: 500px;
      max-height: 800px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
    }

    .popup-header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #0078D4, #005a9e);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .popup-header-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-header-actions {
      display: flex;
      gap: 4px;
    }

    .popup-header .btn-icon {
      color: rgba(255, 255, 255, 0.8);
      border-radius: 4px;
    }

    .popup-header .btn-icon:hover {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .popup-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
    }

    .popup-body::-webkit-scrollbar {
      width: 6px;
    }

    .popup-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .popup-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .popup-footer {
      padding: 12px 16px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .popup-footer .btn {
      flex: 1;
      justify-content: center;
    }

    /* URL 列表项 */
    .url-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .url-item:hover { background: var(--bg); }
    .url-item:last-child { border-bottom: none; }

    .url-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .url-item-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .url-item-status.pending { background: var(--text-muted); }
    .url-item-status.parsed { background: var(--primary); }
    .url-item-status.downloading { background: var(--warning); animation: pulse 1.5s infinite; }
    .url-item-status.completed { background: var(--success); }
    .url-item-status.error { background: var(--error); }

    .url-item-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-item-domain {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .url-item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .url-item:hover .url-item-actions { opacity: 1; }

    .url-item.selected {
      background: color-mix(in srgb, var(--primary) 8%, transparent);
    }

    .url-item-checkbox {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1;
    }

    .url-item-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .url-item {
      position: relative;
      padding-left: 32px;
    }

    /* 快捷操作区 */
    .quick-actions {
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .quick-actions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .quick-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .quick-action-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .quick-action-icon {
      font-size: 18px;
    }

    /* 输入框 */
    .input-group {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .input-group input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    /* 统计信息 */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* 模态框 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      width: 320px;
      max-height: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal { transform: scale(1); }

    .modal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .modal-body {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    /* 视频信息卡 */
    .url-list-header {
      padding: 8px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .url-list-header .url-item {
      padding: 6px 8px;
    }

    /* 视频信息卡 */
    .video-info {
      padding: 12px 16px;
      background: var(--primary-light);
      border-bottom: 1px solid var(--border);
    }

    .video-info-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-info-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .video-info-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>
   
  <!-- 调试面板 -->
  <div id="debug-panel" style="background:#fff3cd;border-bottom:1px solid #ffc107;padding:8px 12px;font-size:11px;display:none;color:#856404;">
    <b>⚠️ 状态:</b>
    <span id="debug-error"></span>
  </div>
  
  <div class="popup">
    <!-- 顶部栏 -->
    <div class="popup-header">
      <div class="popup-header-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        M3U8 Stream Catcher
      </div>
      <div class="popup-header-actions">
        <button class="btn-icon" id="btn-open-manager" title="下载管理器">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="btn-icon" id="btn-open-settings" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 快捷操作 -->
    <div class="quick-actions">
      <div class="quick-actions-grid">
        <button class="quick-action-btn" id="btn-scan">
          <span class="quick-action-icon">&#128269;</span>
          <span>扫描页面</span>
        </button>
        <button class="quick-action-btn" id="btn-parse">
          <span class="quick-action-icon">&#128200;</span>
          <span>解析选中</span>
        </button>
        <button class="quick-action-btn" id="btn-download">
          <span class="quick-action-icon">&#128229;</span>
          <span>下载选中</span>
        </button>
      </div>
    </div>

    <!-- 输入框 -->
    <div class="input-group">
      <input type="text" id="manual-url" placeholder="输入 M3U8 链接或页面 URL...">
      <button class="btn btn-primary btn-sm" id="btn-add-url">添加</button>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">已捕获</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-parsed">0</div>
        <div class="stat-label">已解析</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-downloading">0</div>
        <div class="stat-label">下载中</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-label">已完成</div>
      </div>
    </div>

    <!-- URL 列表 -->
    <div class="popup-body" id="url-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">&#127909;</div>
        <div class="empty-state-title">暂无捕获的链接</div>
        <div class="empty-state-desc">访问包含 M3U8 视频的网页，插件将自动检测并列出</div>
      </div>
      <!-- 动态填充 -->
    </div>

    <!-- 底部按钮 -->
    <div class="popup-footer">
      <button class="btn btn-secondary" id="btn-clear">清空列表</button>
      <button class="btn btn-primary" id="btn-download-all">下载全部</button>
    </div>
  </div>

  <!-- 解析详情模态框 -->
  <div class="modal-overlay" id="modal-detail">
    <div class="modal">
      <div class="modal-header">视频详情</div>
      <div class="modal-body" id="modal-detail-body">
        <!-- 动态内容 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-close">关闭</button>
        <button class="btn btn-primary" id="modal-download">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          开始下载
        </button>
      </div>
    </div>
  </div>

  <script src="../lib/storage-utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
